<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>社有車予約</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="//code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" />
    <style>
        /* 🟢 ヘッダーデザイン */
        .g-header {
            background-color: #115728; color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; flex-wrap: wrap;
        }
        .g-header h1 { font-size: 18px; font-weight: bold; margin: 0; color: white; }
        .title-part { display: inline-block; white-space: nowrap; }
        .g-nav { font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .g-nav a, .g-nav a:link, .g-nav a:visited { color: white !important; text-decoration: none; }
        .g-nav a:hover { text-decoration: underline; }
        .nav-divider { color: #ccc; }

        /* 📱 スマホズーム防止 */
        input[type="text"], input[type="password"], select, .form-control { font-size: 16px !important; }

        /* 🚀 余白の極限カット */
        .login-reservation-wrapper { margin: 0 !important; }
        .login-form-container { padding: 5px 10px 0px 10px !important; text-align: center; }
        .reservation-inner { padding: 0 !important; }

        /* 🔴 修正：幅を半分(75px)に */
        #nameSelector {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background-color: white;
            color: #333;
            width: 75px; 
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> 
    <script src="//code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/i18n/jquery.ui.datepicker-ja.min.js"></script>
</head>
<body>

<header class="g-header">
    <h1><span class="title-part">社有車予約</span></h1>
    <nav class="g-nav">
        <a href="index.html">ホーム</a>
    </nav>
</header>

<div id="customAlert" style="display: none; position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border: 1px solid #ccc; z-index: 9999; text-align: center; min-width: 260px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
  <p id="alertMessage" style="margin-bottom: 20px;"></p>
  <button id="alertOkButton" class="btn btn-primary">OK</button>
</div>

<div class="login-reservation-wrapper">
  <div class="login-form-container">
    <div style="display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 5px;">
      
      <div id="initialLoginArea" style="display: inline-flex; align-items: center; gap: 10px;">
        <select id="nameSelector" class="form-control" onchange="autoLogon(this)">
            <option value="">...</option>
            <option value="岩本">岩本</option>
            <option value="長澤">長澤</option>
            <option value="石橋">石橋</option>
            <option value="齋藤">齋藤</option>
            <option value="坂本">坂本</option>
            <option value="佐藤">佐藤</option>
            <option value="久保木">久保木</option>
            <option value="その他">その他</option>
        </select>
      </div>

      <button id="logoutBtn" class="btn btn-warning" style="display: none;">ログオフ</button>
      <span id="roomDisplay" style="font-size: 15px; font-weight: bold; color: #333; white-space: nowrap;">未ログオン状態です</span>
      
    </div>

    <form id="loginForm" method="post" style="display: none; visibility: hidden; margin-bottom: 5px;">
        <div style="display: flex; justify-content: center; align-items: center; gap: 5px;">
          <input type="text" id="loginId" placeholder="社員番号" autocomplete="off" style="width: 100px;" />
          <input type="password" id="loginPw" placeholder="パスワード" autocomplete="off" style="width: 100px;" />
          <button id="submitLogin" class="btn btn-primary">ログオン</button>
        </div>
    </form>
  </div>
</div>

<span id="currentStartDate" data-date="INITIAL" style="display: none;"></span>
<span id="currentMode" data-mode="WEEK" style="display: none;"></span>

<div class="reservation-table-container">
  <div class="reservation-inner">
    
    <div class="sticky-top-container">
        <div style="text-align: center; margin-bottom: 5px; display: flex; justify-content: center; flex-wrap: wrap; gap: 4px;">
          <button id="todayBtn" class="btn btn-primary">今日</button>
          <button id="prevWeekBtn" class="btn btn-secondary">前週</button>
          <button id="nextWeekBtn" class="btn btn-secondary">次週</button>
          <input type="text" id="datePicker" readonly="" style="display: none;" />
          <button id="calendarBtn" class="btn btn-secondary">カレンダー</button>
          <button id="myReservationBtn" class="btn btn-info">My予約</button>
        </div>
        
        <h4>予約一覧 <span id="startDateDisplay">...</span> 〜 <span id="endDateDisplay">...</span></h4>
    </div>
    
    <div class="table-responsive">
        <table id="reservationTable" class="table table-bordered table-striped" style="width: 100%;">
          <thead>
            <tr>
              <th>予約対象日</th>
              <th>対象車種</th>
              <th>時間帯</th>
              <th>予約状態</th>
              <th>予約者名</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="reservationTableBody">
            <tr class="template" style="display: none;">
              <td class="reservation-date-cell"></td>
              <td class="reservation-model"></td>
              <td class="reservation-time"></td>
              <td class="reservation-status"></td>
              <td class="reservation-name"></td>
              <td style="text-align: center;">
                <button type="button" class="reserve-btn" style="display: none;">予約</button>
                <button type="button" class="cancel-btn" style="display: none;">取消</button>
              </td>
            </tr>
          </tbody>
        </table>
    </div>
    <p id="noDataMessage" style="text-align: center; display: none; padding: 20px;">予約データはありません。</p>
  </div>
</div>

<script src="list.js?v=20260437e" defer></script>

<footer>
    <div style="font-weight: bold;">社有車予約システム</div>
</footer>
<script>
    // 全てのボタンでクリック時にフォーカスを外す（既存機能）
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
            if(document.activeElement) document.activeElement.blur();
        });
    });

    // 🔴 選択されたら即座にログオンを実行する関数（既存機能）
    function autoLogon(selectElem) {
        const selectedName = selectElem.value;
        if (!selectedName) return;
        
        const expiresAt = Date.now() + 1000 * 60 * 10; 
        localStorage.setItem("roomID", selectedName);
        localStorage.setItem("roomID_expiry", String(expiresAt));
        sessionStorage.setItem("roomID", selectedName);
        
        location.reload(); 
    }

    // 🔴 門番機能：未ログオン状態での「予約・取消」を完全にブロックする
    // list.js側の処理が動く前に割り込んでチェックします
    document.addEventListener("click", function(event) {
        const reserveBtn = event.target.closest(".reserve-btn");
        const cancelBtn = event.target.closest(".cancel-btn");

        // 予約または取消ボタンが押された時だけチェック
        if (reserveBtn || cancelBtn) {
            const loginId = localStorage.getItem("roomID"); // ログオン情報を確認
            
            if (!loginId) {
                // 動作を完全に停止させる
                event.preventDefault(); 
                event.stopImmediatePropagation(); 
                
                // ユーザーに警告を表示（alert または showAlert）
                alert("予約や取消を行うには、まずお名前を選択してログオンしてください。");
                return false;
            }
        }
    }, true); // 「true」を指定することで、他のイベントより最優先で実行させます
</script>

</body>
</html>
